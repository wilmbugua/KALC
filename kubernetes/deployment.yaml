apiVersion: apps/v1
kind: Deployment
metadata:
  name: kalcpos
  namespace: kalcpos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kalcpos
  template:
    metadata:
      labels:
        app: kalcpos
    spec:
      containers:
      - name: kalcpos
        image: wilmbugua/kalcpos:1.5.5
        env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: kalcpos-db-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kalcpos-db-credentials
              key: password
        - name: DB_SERVER
          valueFrom:
            secretKeyRef:
              name: kalcpos-db-credentials
              key: server
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: kalcpos-db-credentials
              key: database
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"